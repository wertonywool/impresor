<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.E.E.S. IMPRESOR // Persona 3 Reload Edition</title>
    <link rel="icon" type="image/png" href="icon.png">
    
    <!-- Cropper.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    
    <!-- Estilos Ultra-Divididos -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/controls.css">
    <link rel="stylesheet" href="css/paper.css">
    <link rel="stylesheet" href="css/mini-editor.css">
    <link rel="stylesheet" href="css/print.css">
</head>
<body>

    <h1>[ S.E.E.S. PRINTING SYSTEM ]</h1>

    <div class="controls-container">
        <div class="btn-group">
            <label class="file-upload-label">
                <input type="file" id="file-input" multiple accept="image/*">
                <span>+ CARGAR ARCHIVOS</span>
            </label>
            <button class="btn-p3r" onclick="clearPaper()"><span>LIMPIAR TODO</span></button>
            <button class="btn-p3r btn-print" onclick="window.print()"><span>🖨️ IMPRIMIR</span></button>
        </div>

        <div class="btn-group">
            <button id="btn-carta" class="btn-p3r active" onclick="setPaperSize('carta')"><span>CARTA</span></button>
            <button id="btn-oficio" class="btn-p3r" onclick="setPaperSize('oficio')"><span>OFICIO</span></button>
        </div>

        <div class="btn-group">
            <div class="slider-group">
                <label>COL:</label>
                <input type="range" id="cols-slider" min="1" max="6" value="2" oninput="updateLayout()">
                <span id="cols-value">2</span>
            </div>
            <div class="slider-group">
                <label>FILAS:</label>
                <input type="range" id="rows-slider" min="1" max="8" value="3" oninput="updateLayout()">
                <span id="rows-value">3</span>
            </div>
            <div class="slider-group">
                <label>MARGEN:</label>
                <input type="range" id="gap-slider" min="0" max="20" value="5" oninput="updateLayout()">
                <span id="gap-value">5mm</span>
            </div>
        </div>
    </div>

    <div id="pages-container">
        <!-- Las páginas se generarán aquí automáticamente -->
    </div>

    <div class="instruction-main" id="instruction-text" style="text-align:center; color:rgba(255,255,255,0.2); font-family:var(--font-accent); font-size:3rem; margin-top:50px;">
        SISTEMA EN ESPERA // INSERTAR DATOS
    </div>

    <script>
        const pagesContainer = document.getElementById('pages-container');
        const fileInput = document.getElementById('file-input');
        const colsSlider = document.getElementById('cols-slider');
        const rowsSlider = document.getElementById('rows-slider');
        const gapSlider = document.getElementById('gap-slider');
        const instructionText = document.getElementById('instruction-text');
        
        const DIMS = {
            carta: { w: 215.9, h: 279.4 },
            oficio: { w: 215.9, h: 355.6 }
        };

        let currentPaperSize = 'carta';
        let imagesData = []; 

        document.addEventListener('paste', handlePaste);
        fileInput.addEventListener('change', (e) => {
            Array.from(e.target.files).forEach(processImage);
            fileInput.value = '';
        });

        function handlePaste(e) {
            const items = e.clipboardData.items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    processImage(items[i].getAsFile());
                }
            }
        }

        function processImage(blob) {
            const url = URL.createObjectURL(blob);
            const imgParams = {
                id: Date.now() + Math.random(),
                originalUrl: url,
                currentUrl: url,
                rotation: 0,
                scale: 1.0
            };
            imagesData.push(imgParams);
            updateLayout();
        }

        function updateLayout() {
            const cols = parseInt(colsSlider.value);
            const rows = parseInt(rowsSlider.value);
            const gap = gapSlider.value;
            const imagesPerPage = cols * rows;
            
            document.getElementById('cols-value').textContent = cols;
            document.getElementById('rows-value').textContent = rows;
            document.getElementById('gap-value').textContent = gap + 'mm';

            // Limpiar contenedor de páginas
            pagesContainer.innerHTML = '';
            
            if (imagesData.length === 0) {
                instructionText.style.display = 'block';
                return;
            }
            instructionText.style.display = 'none';

            // Calcular cuántas páginas necesitamos
            const totalPages = Math.ceil(imagesData.length / imagesPerPage);
            const dims = DIMS[currentPaperSize];

            for (let p = 0; p < totalPages; p++) {
                const paper = document.createElement('div');
                paper.className = 'paper';
                paper.style.width = dims.w + 'mm';
                paper.style.height = dims.h + 'mm';
                paper.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
                paper.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
                paper.style.gap = gap + 'mm';
                paper.style.padding = gap + 'mm';

                const indicator = document.createElement('div');
                indicator.className = 'page-indicator';
                indicator.textContent = `PAGE ${p + 1}`;
                paper.appendChild(indicator);

                // Obtener imágenes para esta página
                const start = p * imagesPerPage;
                const end = start + imagesPerPage;
                const pageImages = imagesData.slice(start, end);

                pageImages.forEach(imgData => {
                    const cell = document.createElement('div');
                    cell.className = 'image-cell';
                    cell.dataset.id = imgData.id;
                    
                    cell.innerHTML = `
                        <div class="mini-editor">
                            <button onclick="adjustScale('${imgData.id}', 0.05)">➕</button>
                            <button onclick="adjustScale('${imgData.id}', -0.05)">➖</button>
                            <button onclick="duplicateImage('${imgData.id}')">📋</button>
                            <button onclick="rotateImage('${imgData.id}')">🔄</button>
                            <button onclick="startCrop('${imgData.id}')">✂️</button>
                            <button class="btn-danger" onclick="deleteImage('${imgData.id}')">🗑️</button>
                        </div>
                        <div class="img-container">
                            <img src="${imgData.currentUrl}" style="transform: rotate(${imgData.rotation}deg) scale(${imgData.scale})">
                        </div>
                    `;
                    paper.appendChild(cell);
                });

                pagesContainer.appendChild(paper);
            }
        }

        function adjustScale(id, delta) {
            const img = imagesData.find(i => i.id == id);
            if (img) {
                img.scale = Math.max(0.1, img.scale + delta);
                updateLayout();
            }
        }

        function rotateImage(id) {
            const img = imagesData.find(i => i.id == id);
            if (img) {
                img.rotation = (img.rotation + 90) % 360;
                updateLayout();
            }
        }

        function duplicateImage(id) {
            const original = imagesData.find(img => img.id == id);
            if (original) {
                const copy = { ...original, id: Date.now() + Math.random() };
                imagesData.push(copy);
                updateLayout();
            }
        }

        function deleteImage(id) {
            imagesData = imagesData.filter(i => i.id != id);
            updateLayout();
        }

        function clearPaper() {
            imagesData = [];
            updateLayout();
        }

        function setPaperSize(size) {
            currentPaperSize = size;
            document.getElementById('btn-carta').classList.toggle('active', size === 'carta');
            document.getElementById('btn-oficio').classList.toggle('active', size === 'oficio');
            updateLayout();
        }

        // --- Cropper logic ---
        let currentCropper = null;
        let croppingId = null;

        function startCrop(id) {
            const imgData = imagesData.find(i => i.id == id);
            if (!imgData) return;
            croppingId = id;

            const modal = document.createElement('div');
            modal.id = 'crop-modal';
            modal.style = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px;";
            modal.innerHTML = `
                <div style="background:#000; padding:20px; border:3px solid var(--p3r-blue-bright); transform:skewX(-5deg);">
                    <h2 style="color:var(--p3r-yellow); font-family:var(--font-accent); margin:0 0 15px 0;">[ TARGET ADJUSTMENT ]</h2>
                    <div style="max-height:70vh; max-width:90vw;">
                        <img id="crop-target" src="${imgData.originalUrl}" style="max-width:100%;">
                    </div>
                    <div style="display:flex; gap:10px; margin-top:15px;">
                        <button class="btn-p3r" onclick="cancelCrop()"><span>CANCEL</span></button>
                        <button class="btn-p3r active" onclick="confirmCrop()"><span>EXECUTE</span></button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            currentCropper = new Cropper(document.getElementById('crop-target'), { viewMode: 1 });
        }

        function cancelCrop() {
            if (currentCropper) currentCropper.destroy();
            const modal = document.getElementById('crop-modal');
            if (modal) modal.remove();
        }

        function confirmCrop() {
            const canvas = currentCropper.getCroppedCanvas();
            const url = canvas.toDataURL('image/jpeg', 0.9);
            const imgData = imagesData.find(i => i.id == croppingId);
            imgData.currentUrl = url;
            cancelCrop();
            updateLayout();
        }

    </script>
</body>
</html>
